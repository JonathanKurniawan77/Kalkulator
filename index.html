<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator</title>
    <style>
        body {
            background: linear-gradient(145deg, #2b3a67, #1d2b4b);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }
        h2 {
            color: white;
            margin-bottom: 24px;
            font-weight: 400;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 2rem;
        }
        .calc {
            width: 340px;
            background: white;
            border-radius: 32px;
            padding: 24px 16px;
        }
        .tabel {
            width: 100%;
            border-collapse: separate;
            border-spacing: 8px;
            text-align: center;
        }
        .layarr {
            width: 100%;
            height: 70px;
            font-size: 28px;
            font-weight: 500;
            padding: 0 16px;
            border-radius: 24px;
            border: none;
            background: #f2f5fa;
            color: #1e293b;
            text-align: right;
            outline: 2px solid transparent;
            font-family: inherit;
        }
        .layarr:focus {
            outline: 2px solid #3b82f6;
        }
        .tombol {
            width: 60px;
            height: 60px;
            font-size: 24px;
            font-weight: 600;
            border-radius: 24px;
            border: none;
            background: #f1f5f9;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-family: inherit;
        }
        #plus, #minus, #multiply, #divide {
            background: #fbbf24;
            color: #1e293b;
        }
        #equals {
            background: #10b981;
            color: white;
        }
        #reset {
            background: #ef4444;
            color: white;
        }
    </style>

</head>
<body>

    <center>
    <h2>Program Kalkulator</h2>
    <div class="calc">
    <table class="tabel">
        <tr><td colspan="4"><input type="text" id="layar" class="layarr" readonly style="text-align:right;"></td></tr>
        <tr>
            <td><button class="tombol" onclick="tekanAngka('1')">1</button></td>
            <td><button class="tombol" onclick="tekanAngka('2')">2</button></td>
            <td><button class="tombol" onclick="tekanAngka('3')">3</button></td>
            <td><button class="tombol" onclick="tekanOperator('+')">+</button></td>
        </tr>
        <tr>
            <td><button class="tombol" onclick="tekanAngka('4')">4</button></td>
            <td><button class="tombol" onclick="tekanAngka('5')">5</button></td>
            <td><button class="tombol" onclick="tekanAngka('6')">6</button></td>
            <td><button class="tombol" onclick="tekanOperator('-')">-</button></td>
        </tr>
        <tr>
            <td><button class="tombol" onclick="tekanAngka('7')">7</button></td>
            <td><button class="tombol" onclick="tekanAngka('8')">8</button></td>
            <td><button class="tombol" onclick="tekanAngka('9')">9</button></td>
            <td><button class="tombol" onclick="tekanOperator('*')">×</button></td>
        </tr>
        <tr>
            <td><button class="tombol" onclick="empty()">C</button></td>
            <td><button class="tombol" onclick="tekanAngka('0')">0</button></td>
            <td><button class="tombol" onclick="hitung()">=</button></td>
            <td><button class="tombol" onclick="tekanOperator('/')">÷</button></td>
        </tr>
    </table>
    </div>
    </center>

<script>
    function tekanAngka(angka){
        document.getElementById("layar").value += angka;
    }
    function tekanOperator(operator){
        document.getElementById("layar").value += operator;
    }
    function hitung(){
        let layar = document.getElementById("layar");
        try { layar.value = eval(layar.value); } catch { layar.value = "Error"; }
    }
    function empty(){
        document.getElementById("layar").value = "";
    }
</script>
</body>
</html>
